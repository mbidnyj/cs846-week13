<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microblog</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
  header { background: #1da1f2; color: #fff; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 20px; }
  #user-info { font-size: 14px; }
  #user-info span { margin-right: 12px; }
  .container { max-width: 700px; margin: 20px auto; padding: 0 16px; }

  /* Panels */
  .panel { background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .panel h2 { font-size: 16px; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
  .panel input, .panel textarea { width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
  .panel textarea { resize: vertical; min-height: 60px; }
  .panel button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-right: 6px; margin-bottom: 4px; }
  .btn-primary { background: #1da1f2; color: #fff; }
  .btn-danger { background: #e0245e; color: #fff; }
  .btn-secondary { background: #657786; color: #fff; }
  .btn-success { background: #17bf63; color: #fff; }

  /* Posts */
  .post { border: 1px solid #e1e8ed; border-radius: 8px; padding: 12px; margin-bottom: 10px; background: #fff; }
  .post-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .post-author { font-weight: 600; color: #1da1f2; cursor: pointer; }
  .post-time { color: #999; font-size: 12px; }
  .post-content { margin-bottom: 8px; line-height: 1.4; }
  .post-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .post-actions button { font-size: 12px; padding: 4px 10px; }
  .post-stats { font-size: 12px; color: #657786; }

  .reply { margin-left: 24px; padding: 8px; border-left: 3px solid #1da1f2; margin-top: 6px; background: #f8f9fa; border-radius: 0 4px 4px 0; }
  .reply-author { font-weight: 600; font-size: 13px; }
  .reply-content { font-size: 13px; }

  .msg { padding: 8px; border-radius: 4px; margin-bottom: 8px; font-size: 13px; }
  .msg-ok { background: #e6f9ee; color: #17bf63; }
  .msg-err { background: #fde8ec; color: #e0245e; }

  .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab-bar button { flex: 1; padding: 10px; border: none; background: #e1e8ed; border-radius: 4px 4px 0 0; cursor: pointer; font-size: 14px; }
  .tab-bar button.active { background: #1da1f2; color: #fff; }

  .hidden { display: none; }

  /* Pagination */
  .pagination { display: flex; gap: 8px; align-items: center; justify-content: center; margin-top: 12px; }
  .pagination button { padding: 6px 14px; }
  .pagination span { font-size: 13px; color: #657786; }

  /* User profile view */
  .profile-card { text-align: center; padding: 20px; }
  .profile-card h3 { font-size: 20px; margin-bottom: 4px; }
  .profile-card p { color: #657786; }
</style>
</head>
<body>

<header>
  <h1>Microblog</h1>
  <div id="user-info">
    <span id="logged-in-as" class="hidden">Logged in as <strong id="current-user"></strong></span>
    <button class="btn-danger" id="logout-btn" onclick="logout()" style="display:none">Logout</button>
  </div>
</header>

<div class="container">
  <!-- Status message -->
  <div id="status" class="hidden msg"></div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="active" onclick="showTab('auth')">Auth</button>
    <button onclick="showTab('profile')">Profile</button>
    <button onclick="showTab('compose')">Compose</button>
    <button onclick="showTab('feed')">Feed</button>
    <button onclick="showTab('userview')">User Lookup</button>
  </div>

  <!-- Auth Panel -->
  <div id="tab-auth" class="panel">
    <h2>Register / Login</h2>
    <input id="auth-user" placeholder="Username" />
    <input id="auth-pass" type="password" placeholder="Password" />
    <div>
      <button class="btn-primary" onclick="doRegister()">Register</button>
      <button class="btn-success" onclick="doLogin()">Login</button>
    </div>
  </div>

  <!-- Profile Panel -->
  <div id="tab-profile" class="panel hidden">
    <h2>My Profile</h2>
    <button class="btn-secondary" onclick="loadProfile()">Load Profile</button>
    <div id="profile-display" style="margin:12px 0"></div>
    <h2>Update Profile</h2>
    <input id="prof-display-name" placeholder="Display Name" />
    <textarea id="prof-bio" placeholder="Bio"></textarea>
    <button class="btn-primary" onclick="updateProfile()">Update</button>
  </div>

  <!-- Compose Panel -->
  <div id="tab-compose" class="panel hidden">
    <h2>New Post</h2>
    <textarea id="post-content" placeholder="What's happening?"></textarea>
    <button class="btn-primary" onclick="createPost()">Post</button>
    <hr style="margin:16px 0">
    <h2>Edit / Delete Post</h2>
    <input id="edit-post-id" placeholder="Post ID" />
    <textarea id="edit-content" placeholder="New content (for edit)"></textarea>
    <div>
      <button class="btn-primary" onclick="editPost()">Edit</button>
      <button class="btn-danger" onclick="deletePost()">Delete</button>
    </div>
  </div>

  <!-- Feed Panel -->
  <div id="tab-feed" class="panel hidden">
    <h2>Global Feed</h2>
    <button class="btn-primary" onclick="loadFeed()">Refresh Feed</button>
    <div id="feed-posts" style="margin-top:12px"></div>
    <div class="pagination">
      <button class="btn-secondary" id="feed-prev" onclick="feedPrev()">Prev</button>
      <span id="feed-info"></span>
      <button class="btn-secondary" id="feed-next" onclick="feedNext()">Next</button>
    </div>
  </div>

  <!-- User Lookup Panel -->
  <div id="tab-userview" class="panel hidden">
    <h2>View User Profile</h2>
    <input id="lookup-user" placeholder="Username" />
    <button class="btn-primary" onclick="lookupUser()">Look Up</button>
    <div id="user-profile-view" style="margin-top:12px"></div>
  </div>
</div>

<!-- Reply modal -->
<div id="reply-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);align-items:center;justify-content:center;z-index:100">
  <div class="panel" style="width:400px">
    <h2>Reply to Post</h2>
    <input id="reply-post-id" readonly style="background:#eee" />
    <textarea id="reply-content" placeholder="Your reply..."></textarea>
    <div>
      <button class="btn-primary" onclick="submitReply()">Reply</button>
      <button class="btn-secondary" onclick="closeReplyModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const API = '';
let sessionId = null;
let currentUsername = null;
let feedOffset = 0;
const FEED_LIMIT = 10;

// --- Helpers ---
function showStatus(msg, ok) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 4000);
}

function headers(json) {
  const h = {};
  if (sessionId) h['Authorization'] = sessionId;
  if (json) h['Content-Type'] = 'application/json';
  return h;
}

async function api(method, path, body) {
  const opts = { method, headers: headers(!!body) };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || data.description || 'Request failed');
  return data;
}

function showTab(name) {
  document.querySelectorAll('.tab-bar button').forEach((b, i) => {
    const tabs = ['auth','profile','compose','feed','userview'];
    b.classList.toggle('active', tabs[i] === name);
  });
  ['auth','profile','compose','feed','userview'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('hidden', t !== name);
  });
  if (name === 'feed') loadFeed();
}

function setLoggedIn(user, sid) {
  sessionId = sid;
  currentUsername = user;
  document.getElementById('current-user').textContent = user;
  document.getElementById('logged-in-as').classList.remove('hidden');
  document.getElementById('logout-btn').style.display = 'inline-block';
}

function logout() {
  sessionId = null;
  currentUsername = null;
  document.getElementById('logged-in-as').classList.add('hidden');
  document.getElementById('logout-btn').style.display = 'none';
  showStatus('Logged out', true);
  showTab('auth');
}

function fmtTime(ts) {
  return new Date(ts * 1000).toLocaleString();
}

// --- Auth ---
async function doRegister() {
  try {
    const data = await api('POST', '/register', {
      username: document.getElementById('auth-user').value,
      password: document.getElementById('auth-pass').value
    });
    showStatus(data.message, true);
  } catch (e) { showStatus(e.message, false); }
}

async function doLogin() {
  try {
    const user = document.getElementById('auth-user').value;
    const data = await api('POST', '/login', {
      username: user,
      password: document.getElementById('auth-pass').value
    });
    setLoggedIn(user, data.session_id);
    showStatus('Logged in!', true);
  } catch (e) { showStatus(e.message, false); }
}

// --- Profile ---
async function loadProfile() {
  try {
    const data = await api('GET', '/profile');
    document.getElementById('profile-display').innerHTML =
      `<strong>${data.username}</strong><br>Display: ${data.display_name || '(not set)'}<br>Bio: ${data.bio || '(not set)'}`;
  } catch (e) { showStatus(e.message, false); }
}

async function updateProfile() {
  try {
    const data = await api('POST', '/profile/update', {
      display_name: document.getElementById('prof-display-name').value || null,
      bio: document.getElementById('prof-bio').value || null
    });
    showStatus(data.message, true);
    loadProfile();
  } catch (e) { showStatus(e.message, false); }
}

// --- Posts ---
async function createPost() {
  try {
    const data = await api('POST', '/post', {
      content: document.getElementById('post-content').value
    });
    showStatus(data.message + ' (ID: ' + data.post_id + ')', true);
    document.getElementById('post-content').value = '';
  } catch (e) { showStatus(e.message, false); }
}

async function editPost() {
  try {
    const data = await api('POST', '/post/edit', {
      post_id: document.getElementById('edit-post-id').value,
      content: document.getElementById('edit-content').value
    });
    showStatus(data.message, true);
  } catch (e) { showStatus(e.message, false); }
}

async function deletePost() {
  try {
    const data = await api('POST', '/post/delete', {
      post_id: document.getElementById('edit-post-id').value
    });
    showStatus(data.message, true);
  } catch (e) { showStatus(e.message, false); }
}

// --- Feed ---
async function loadFeed() {
  try {
    const data = await api('GET', `/feed?offset=${feedOffset}&limit=${FEED_LIMIT}`);
    renderPosts(data.posts, 'feed-posts', true);
    document.getElementById('feed-info').textContent =
      `Showing ${feedOffset + 1}-${Math.min(feedOffset + FEED_LIMIT, data.total_count)} of ${data.total_count}`;
    document.getElementById('feed-prev').disabled = feedOffset === 0;
    document.getElementById('feed-next').disabled = feedOffset + FEED_LIMIT >= data.total_count;
  } catch (e) { showStatus(e.message, false); }
}

function feedPrev() { feedOffset = Math.max(0, feedOffset - FEED_LIMIT); loadFeed(); }
function feedNext() { feedOffset += FEED_LIMIT; loadFeed(); }

function renderPosts(posts, containerId, showActions) {
  const container = document.getElementById(containerId);
  if (!posts.length) { container.innerHTML = '<p style="color:#999">No posts yet.</p>'; return; }
  container.innerHTML = posts.map(p => `
    <div class="post">
      <div class="post-header">
        <span class="post-author" onclick="lookupUserByName('${p.author}')">${p.author}</span>
        <span class="post-time">${fmtTime(p.created_at)}${p.updated_at ? ' (edited)' : ''}</span>
      </div>
      <div class="post-content">${escHtml(p.content)}</div>
      <div class="post-stats">${p.like_count || 0} likes &middot; ${p.reply_count || 0} replies</div>
      ${showActions && sessionId ? `
        <div class="post-actions">
          <button class="btn-primary" onclick="likePost('${p.post_id}')">Like</button>
          <button class="btn-secondary" onclick="openReplyModal('${p.post_id}')">Reply</button>
          ${p.author === currentUsername ? `
            <button class="btn-secondary" onclick="prefillEdit('${p.post_id}')">Edit</button>
            <button class="btn-danger" onclick="quickDelete('${p.post_id}')">Delete</button>
          ` : ''}
        </div>
      ` : ''}
      ${(p.replies || []).map(r => `
        <div class="reply">
          <span class="reply-author">${r.author}</span>
          <span class="post-time" style="margin-left:8px">${fmtTime(r.created_at)}</span>
          <div class="reply-content">${escHtml(r.content)}</div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- Like ---
async function likePost(postId) {
  try {
    const data = await api('POST', '/post/like', { post_id: postId });
    showStatus(data.message + ' (' + data.like_count + ' total)', true);
    loadFeed();
  } catch (e) { showStatus(e.message, false); }
}

// --- Reply ---
function openReplyModal(postId) {
  document.getElementById('reply-post-id').value = postId;
  document.getElementById('reply-content').value = '';
  const modal = document.getElementById('reply-modal');
  modal.classList.remove('hidden');
  modal.style.display = 'flex';
}
function closeReplyModal() {
  const modal = document.getElementById('reply-modal');
  modal.classList.add('hidden');
  modal.style.display = 'none';
}
async function submitReply() {
  try {
    const data = await api('POST', '/post/reply', {
      post_id: document.getElementById('reply-post-id').value,
      content: document.getElementById('reply-content').value
    });
    showStatus(data.message, true);
    closeReplyModal();
    loadFeed();
  } catch (e) { showStatus(e.message, false); }
}

// --- Quick actions from feed ---
function prefillEdit(postId) {
  document.getElementById('edit-post-id').value = postId;
  showTab('compose');
}
async function quickDelete(postId) {
  if (!confirm('Delete this post?')) return;
  try {
    const data = await api('POST', '/post/delete', { post_id: postId });
    showStatus(data.message, true);
    loadFeed();
  } catch (e) { showStatus(e.message, false); }
}

// --- User Lookup ---
async function lookupUser() {
  const username = document.getElementById('lookup-user').value;
  await lookupUserByName(username);
}

async function lookupUserByName(username) {
  try {
    const data = await api('GET', `/user/${username}`);
    const container = document.getElementById('user-profile-view');
    container.innerHTML = `
      <div class="profile-card">
        <h3>${data.username}</h3>
        <p>${data.bio || 'No bio'}</p>
      </div>
    `;
    const postsDiv = document.createElement('div');
    container.appendChild(postsDiv);
    postsDiv.id = 'user-lookup-posts';
    renderPosts(data.posts.map(p => ({...p, author: data.username, replies: []})), 'user-lookup-posts', false);
    document.getElementById('lookup-user').value = username;
    showTab('userview');
  } catch (e) { showStatus(e.message, false); }
}
</script>
</body>
</html>
